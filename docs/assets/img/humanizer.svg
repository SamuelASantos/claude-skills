<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1220"/>
      <stop offset="1" stop-color="#0a0d14"/>
    </linearGradient>
    <radialGradient id="glowC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ef8354" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ef8354" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef8354"/>
      <stop offset="0.5" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#38d4f0"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef8354"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="arrowL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f87171" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ef8354"/>
    </linearGradient>
    <linearGradient id="arrowR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#38d4f0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- fundo -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <g fill="#2a3454" opacity="0.45">
    <circle cx="55" cy="45" r="1.5"/><circle cx="155" cy="85" r="1.5"/><circle cx="85" cy="165" r="1.5"/>
    <circle cx="235" cy="38" r="1.5"/><circle cx="315" cy="105" r="1.5"/><circle cx="55" cy="295" r="1.5"/>
    <circle cx="145" cy="385" r="1.5"/><circle cx="295" cy="415" r="1.5"/><circle cx="425" cy="55" r="1.5"/>
    <circle cx="535" cy="38" r="1.5"/><circle cx="655" cy="75" r="1.5"/><circle cx="745" cy="155" r="1.5"/>
    <circle cx="705" cy="325" r="1.5"/><circle cx="595" cy="395" r="1.5"/><circle cx="465" cy="385" r="1.5"/>
    <circle cx="755" cy="48" r="1.5"/><circle cx="375" cy="28" r="1.5"/>
  </g>
  <ellipse cx="400" cy="220" rx="220" ry="160" fill="url(#glowC)"/>

  <!-- === Bloco esquerdo: texto com IA-isms === -->
  <g>
    <rect x="38" y="100" width="258" height="240" rx="14" fill="#140d0a" stroke="#3a2018" stroke-width="1.5"/>
    <!-- titlebar -->
    <rect x="38" y="100" width="258" height="36" rx="14" fill="#1e1208"/>
    <rect x="38" y="122" width="258" height="14" fill="#1e1208"/>
    <circle cx="60" cy="118" r="5" fill="#f87171"/>
    <circle cx="78" cy="118" r="5" fill="#fbbf24"/>
    <circle cx="96" cy="118" r="5" fill="#4ade80"/>
    <text x="180" y="123" fill="#7a4030" font-size="11" text-anchor="middle">texto com IA-isms</text>

    <!-- linhas de texto AI-generated -->
    <g font-family="Consolas, monospace" font-size="11" fill="#8a7060">
      <!-- linha 1: significância inflada -->
      <text x="56" y="162">In today's rapidly evolving</text>
      <!-- linha 2: em dash overuse -->
      <text x="56" y="180">landscape—this <tspan fill="#f87171" font-weight="700">groundbreaking</tspan></text>
      <!-- linha 3: emojis -->
      <text x="56" y="198">tool serves as a <tspan fill="#fbbf24">🚀</tspan> <tspan fill="#f87171" font-weight="700">testament</tspan></text>
      <!-- linha 4: rule of three -->
      <text x="56" y="216">to <tspan fill="#f87171" font-weight="700">innovation,</tspan> inspiration,</text>
      <text x="56" y="234">and <tspan fill="#f87171" font-weight="700">insights</tspan>. <tspan fill="#ef8354">Additionally</tspan>,</text>
      <!-- linha 5: chatbot ending -->
      <text x="56" y="252">it <tspan fill="#f87171" font-weight="700">showcases</tspan> the</text>
      <text x="56" y="270">transformative potential.</text>
      <text x="56" y="288" fill="#7a5042" font-style="italic">I hope this helps! Let me</text>
      <text x="56" y="306" fill="#7a5042" font-style="italic">know if you need more! 😊</text>
    </g>

    <!-- marcações vermelhas em padrões AI -->
    <line x1="56" y1="183" x2="270" y2="183" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <line x1="56" y1="219" x2="220" y2="219" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <line x1="56" y1="291" x2="265" y2="291" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  </g>

  <!-- seta esquerda -->
  <g stroke="url(#arrowL)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M308 220 H352"/>
    <path d="M344 210 l10 10 l-10 10"/>
  </g>

  <!-- === Centro: o Humanizer === -->
  <g>
    <circle cx="400" cy="220" r="56" fill="#ef8354" opacity="0.15" filter="url(#soft)"/>
    <!-- hexágono rotacionado -->
    <g transform="translate(400,220)">
      <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22"
               fill="url(#core)" stroke="#f8b49c" stroke-width="1.5" opacity="0.95"/>
    </g>
    <!-- ícone de caneta/edição -->
    <g transform="translate(400,220)" filter="url(#glow)">
      <!-- corpo da caneta -->
      <path d="M-10,-10 L10,-10 L18,0 L10,10 L-10,10 L-18,0 Z"
            fill="#fff" fill-opacity="0.15" stroke="#fff" stroke-width="1.5"/>
      <!-- ponta -->
      <path d="M14,0 L22,0" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      <!-- linha -->
      <path d="M-18,0 L-10,0" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      <!-- faísca -->
      <circle cx="22" cy="0" r="3" fill="#ffffff"/>
    </g>
    <text x="400" y="296" fill="#ef8354" font-size="13" font-weight="600" text-anchor="middle" letter-spacing="2">HUMANIZER</text>
    <!-- padrões detectados -->
    <text x="400" y="316" fill="#7a5040" font-size="10" text-anchor="middle">33 padrões · v2.8.0</text>
  </g>

  <!-- seta direita -->
  <g stroke="url(#arrowR)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M452 220 H496"/>
    <path d="M488 210 l10 10 l-10 10"/>
  </g>

  <!-- === Bloco direito: texto humanizado === -->
  <g>
    <rect x="504" y="90" width="258" height="258" rx="14" fill="#0d1424" stroke="#1e3a4a" stroke-width="1.5"/>
    <!-- titlebar -->
    <rect x="504" y="90" width="258" height="36" rx="14" fill="#0f1e30"/>
    <rect x="504" y="112" width="258" height="14" fill="#0f1e30"/>
    <circle cx="526" cy="108" r="5" fill="#f87171"/>
    <circle cx="544" cy="108" r="5" fill="#fbbf24"/>
    <circle cx="562" cy="108" r="5" fill="#4ade80"/>
    <text x="644" y="113" fill="#38d4f0" font-size="11" text-anchor="middle">texto humanizado</text>

    <!-- texto limpo, natural -->
    <g font-family="Consolas, monospace" font-size="11" fill="#7ad4e8">
      <text x="522" y="152">AI coding assistants speed</text>
      <text x="522" y="170">up the boring parts.</text>
      <text x="522" y="196" fill="#5aa8b8">They're great at boilerplate</text>
      <text x="522" y="214" fill="#5aa8b8">you don't want to write.</text>
      <text x="522" y="240" fill="#4898a8">If you review every line,</text>
      <text x="522" y="258" fill="#4898a8">it's useful. If you use it</text>
      <text x="522" y="276" fill="#4898a8">to avoid thinking, it will</text>
      <text x="522" y="294" fill="#4898a8">help you ship bugs faster.</text>
    </g>

    <!-- barra de qualidade -->
    <rect x="522" y="320" width="222" height="7" rx="3.5" fill="#0f1e30"/>
    <rect x="522" y="320" width="222" height="7" rx="3.5" fill="url(#grad)"/>
    <text x="522" y="345" fill="#336678" font-size="11">escrita limpa e natural</text>
    <circle cx="736" cy="341" r="11" fill="rgba(56,212,240,0.1)" stroke="#38d4f0" stroke-width="1.5"/>
    <path d="M731 341 l3.5 3.5 l6 -7" stroke="#38d4f0" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- legenda inferior -->
  <text x="400" y="415" fill="#475270" font-size="13" text-anchor="middle" font-style="italic">de estatisticamente provável para genuinamente humano</text>
</svg>
